<!DOCTYPE html>
<html lang="en">
<head>
    <title>To-Do App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<div class="container mt-5">
    <div class="card shadow-lg p-4 bg-secondary">
        <h2 class="text-center mb-4">📝 My To-Do List</h2>

        <!-- Add Task -->
        <form action="/add" method="POST" class="d-flex mb-3">
            <input type="text" name="task" class="form-control me-2" placeholder="Enter task" required>
            <button class="btn btn-danger">Add</button>
        </form>

        <!-- Task List -->
        <ul class="list-group">
            {% for task in tasks %}
            <li class="list-group-item d-flex justify-content-between align-items-center">

                <div>
                    <input type="checkbox"
                        onclick="window.location='/toggle/{{ loop.index0 }}'"
                        {% if task.status == 1 %} checked {% endif %}>

                    <span style="{% if task.status == 1 %} text-decoration: line-through; color: gray; {% endif %}">
                        {{ task.task }}
                    </span>
                </div>

                <a href="/delete/{{ loop.index0 }}" class="btn btn-sm btn-danger">Delete</a>
            </li>
            {% endfor %}
        </ul>

    </div>
</div>

</body>
</html>
